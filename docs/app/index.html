<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0f12" />
  <title>p2present — synced slides + talk video</title>
  <meta name="description" content="A forkable web app that plays presentation slides in sync with the talk video." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎞️</text></svg>" />
  <link rel="stylesheet" href="../app.css" />
</head>
<body>
  <header class="p2-header">
    <div class="p2-brand">
      <span class="p2-logo">🎞️</span>
      <span class="p2-name">p2present</span>
      <span class="p2-deck-title" id="deck-title"></span>
    </div>
    <button
      type="button"
      class="p2-source-toggle"
      id="source-toggle"
      aria-expanded="false"
      aria-controls="source-form"
      aria-label="Load a presentation from a URL"
      title="Load a presentation from a URL"
    >🔗 Load URL</button>
    <form class="p2-source" id="source-form">
      <input
        id="source-input"
        type="text"
        inputmode="url"
        spellcheck="false"
        placeholder="Paste a source — https://…/p2present.json · ipfs://CID · magnet:?xt=…"
        aria-label="Presentation source URL, IPFS CID, or magnet link"
      />
      <button type="submit" class="p2-load">Load</button>
      <div class="p2-share-wrap">
        <button
          type="button"
          class="p2-load p2-share"
          id="share-btn"
          aria-haspopup="true"
          aria-expanded="false"
          aria-controls="share-menu"
          title="Share this presentation"
          aria-label="Share this presentation"
        >🔗 Share</button>
        <div class="p2-share-menu" id="share-menu" role="menu" hidden>
          <button type="button" class="p2-share-item" id="share-whole" role="menuitem">🔗 Copy presentation link</button>
          <button type="button" class="p2-share-item" id="share-moment" role="menuitem">📍 Copy link to this moment</button>
        </div>
      </div>
    </form>
  </header>

  <nav class="p2-nav" aria-label="Demos and tools">
    <a class="p2-nav-link" href="../">← Home</a>
    <span class="p2-nav-label">Demos:</span>
    <a class="p2-nav-link" href="?p=demo" data-demo="demo">HTML deck</a>
    <a class="p2-nav-link" href="?p=moav-pdf" data-demo="moav-pdf">PDF deck</a>
    <span class="p2-nav-spacer"></span>
    <a class="p2-nav-link" href="../builder/">🛠 Builder</a>
    <a class="p2-nav-link" href="../host/">📤 Host assets</a>
    <a class="p2-nav-link" href="https://github.com/ibeezhan/p2present#readme">Docs</a>
  </nav>

  <p class="p2-status" id="status" role="status" aria-live="polite"></p>

  <main id="app" class="p2-app" aria-live="polite">
    <div class="p2-empty">Loading…</div>
  </main>

  <footer class="p2-footer">
    <span>p2present — paste a remote presentation, build one in the <a href="../builder/">Builder</a>, or <a href="https://github.com/ibeezhan/p2present#fork--self-host">fork &amp; self-host your own</a>.</span>
  </footer>

  <script type="module" src="../src/main.js"></script>
</body>
</html>
